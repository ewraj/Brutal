<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BRUTAL — Optimal AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://js.puter.com/v2/"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <div id="sidebar-overlay"></div>
        <aside id="sidebar">
            <div class="sidebar-top">
                <button id="new-chat-btn">+ New Chat</button>
                <button id="import-btn" title="Import .md chat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 5 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>
            </div>
            <div class="sidebar-search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Search chats..." autocomplete="off">
            </div>
            <div id="chat-list"></div>
            <div class="sidebar-footer">
                <button id="persona-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span id="persona-label">BRUTAL Mode</span>
                </button>
            </div>
        </aside>

        <div id="main-content">
            <header>
                <div class="header-left">
                    <button id="sidebar-toggle" title="Toggle Sidebar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    </button>
                    <div class="logo">
                        <span class="brutal-text">BRUTAL</span>
                        <span class="version">v2</span>
                    </div>
                </div>
                <div class="header-right">

                    <button id="export-btn" title="Export to Obsidian Markdown (Ctrl+E)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        <span>Export .md</span>
                    </button>
                </div>
            </header>

            <div id="chat-wrapper">
                <main id="chat-container">
                    <div id="messages">
                        <div class="system-notice">
                            <p>// ready</p>
                        </div>
                    </div>
                </main>

                <!-- Workflow Panel (visible in initial state) -->
                <div id="workflow-panel" class="workflow-panel">
                    <div class="workflow-header">
                        <h2 class="workflow-title">Workflows</h2>
                        <p class="workflow-subtitle">Skip the prompting. Pick a pipeline.</p>
                    </div>
                    <div class="workflow-grid">
                        <button class="workflow-card" data-workflow="teardown" id="wf-teardown">
                            <div class="workflow-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                            </div>
                            <span class="workflow-label">Tear Apart</span>
                            <span class="workflow-desc">Full multi-pass critique: bugs, style, architecture</span>
                        </button>
                        <button class="workflow-card" data-workflow="security" id="wf-security">
                            <div class="workflow-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                            </div>
                            <span class="workflow-label">Security Audit</span>
                            <span class="workflow-desc">Hunt vulnerabilities, injections, and data leaks</span>
                        </button>
                        <button class="workflow-card" data-workflow="optimize" id="wf-optimize">
                            <div class="workflow-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                            </div>
                            <span class="workflow-label">Optimize</span>
                            <span class="workflow-desc">Performance bottlenecks, memory, and complexity</span>
                        </button>
                    </div>
                </div>

                <footer>
                    <div class="input-wrapper">
                        <button type="button" id="attach-btn" title="Attach image or file">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </button>
                        <input type="file" id="file-input" accept="image/*,.txt,.js,.py,.ts,.md,.json,.css,.html,.c,.cpp,.java,.go,.rs" style="display:none">
                        <div class="input-column">
                            <div id="attachment-preview" class="hidden"></div>
                            <textarea id="user-input" placeholder="> enter command or describe your problem..." rows="1"></textarea>
                        </div>
                        <button type="button" id="send-btn" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                        <button type="button" id="stop-btn" class="hidden" title="Stop generating">
                            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect></svg>
                        </button>
                    </div>
                    <div class="shortcuts-hint">
                        <span><kbd>Ctrl+K</kbd> new chat</span>
                        <span><kbd>Ctrl+E</kbd> export</span>
                        <span><kbd>Shift+Enter</kbd> newline</span>
                    </div>
                </footer>
            </div>
        </div>

        <!-- Login Overlay -->
        <div id="login-overlay" class="hidden">
            <div class="login-card">
                <h2>Authentication Required</h2>
                <p>BRUTAL needs access to Puter's free AI API.</p>
                <button id="login-btn">Secure Login via Puter</button>
            </div>
        </div>

        <input type="file" id="import-file-input" accept=".md" style="display:none">

        <!-- Workflow Code Input Modal -->
        <div id="workflow-modal" class="modal-overlay hidden">
            <div class="modal-card workflow-modal-card">
                <h3 id="workflow-modal-title">Tear Apart</h3>
                <p id="workflow-modal-desc" class="workflow-modal-desc">Paste your code below. Brutal will run a multi-pass analysis.</p>
                <textarea id="workflow-code-input" class="modal-input workflow-code-area" rows="12" placeholder="Paste code here..."></textarea>
                <div class="modal-btn-row">
                    <button class="modal-btn" id="workflow-cancel">Cancel</button>
                    <button class="modal-btn primary" id="workflow-run">Run Analysis</button>
                </div>
            </div>
            </div>
        </div>

        <!-- Code Annotator View -->
        <div id="annotator-view" class="annotator-view hidden">
            <div class="annotator-toolbar">
                <button id="annotator-back" class="annotator-back-btn" title="Back to chat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    <span>Back to Chat</span>
                </button>
                <span class="annotator-title" id="annotator-title">Tear Apart — Annotations</span>
                <div class="annotator-stats" id="annotator-stats"></div>
            </div>
            <div class="annotator-split">
                <div class="annotator-code-pane">
                    <div class="annotator-code" id="annotator-code"></div>
                </div>
                <div class="annotator-gutter"></div>
                <div class="annotator-notes-pane" id="annotator-notes"></div>
            </div>
        </div>
    <script src="app.js"></script>
</body>
</html>
